<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte des forfaits — Local Taxi</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--gold:#e8c88a;--gold2:#c99b52;--champ:#f4e6c8;--deep:#060607;--panel:#0c0d10;--ink:#ece7dc}
  body{background:var(--deep);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
  .map-wrap{width:100%;max-width:920px;position:relative}
  svg{width:100%;height:auto;display:block}

  /* ---- zone borders ---- */
  .border{fill:rgba(255,255,255,.001);stroke:var(--gold);stroke-width:1.6;stroke-linejoin:round;stroke-linecap:round;
          stroke-dasharray:100;stroke-dashoffset:100;
          animation:draw 1.7s cubic-bezier(.7,0,.3,1) forwards;
          transition:stroke .35s,stroke-width .35s,fill .35s}
  @keyframes draw{to{stroke-dashoffset:0}}

  /* ---- labels ---- */
  .price{fill:var(--gold);font-weight:800;letter-spacing:-.5px;text-anchor:middle;pointer-events:none;
         opacity:0;animation:pop .8s cubic-bezier(.16,1,.3,1) forwards;
         filter:drop-shadow(0 0 12px rgba(232,200,138,.30))}
  @keyframes pop{from{opacity:0;transform:translateY(6px) scale(.9)}to{opacity:1;transform:none}}
  .town{fill:rgba(236,231,220,.42);font-size:12px;letter-spacing:.02em;text-anchor:middle;pointer-events:none;
         transition:fill .3s,font-weight .3s;opacity:0;animation:fadein .6s ease forwards}
  @keyframes fadein{to{opacity:1}}

  /* ---- hover on a zone ---- */
  .zone{cursor:pointer}
  .zone:hover .border{stroke:var(--champ);stroke-width:2.6;fill:rgba(232,200,138,.10);
                      filter:drop-shadow(0 0 16px rgba(232,200,138,.45))}
  .zone:hover .town{fill:var(--champ);font-weight:600}
  .zone:hover .price{fill:var(--champ);filter:drop-shadow(0 0 20px rgba(244,230,200,.6))}

  /* ---- floating tooltip ---- */
  .tip{position:absolute;pointer-events:none;z-index:20;display:none;
       background:rgba(12,13,16,.97);
       border:1px solid rgba(232,200,138,.35);border-radius:8px;padding:12px 16px;
       box-shadow:0 20px 50px -14px rgba(0,0,0,.8);max-width:250px}
  .tip.on{display:block}
  .tip .tp{display:flex;align-items:baseline;gap:10px;margin-bottom:6px}
  .tip .tp b{font-size:22px;font-weight:800;color:var(--gold);letter-spacing:-.5px}
  .tip .tp span{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:rgba(236,231,220,.5)}
  .tip .tw{font-size:12.5px;line-height:1.5;color:var(--champ)}
  .tip .th{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-top:8px;opacity:.7}

  /* ---- heading ---- */
  .head-k{fill:var(--gold);font-size:12px;letter-spacing:.34em;text-transform:uppercase;text-anchor:middle}
  .head-t{fill:var(--champ);font-size:40px;font-weight:700;letter-spacing:.02em;text-anchor:middle}
  .head-s{fill:var(--ink);font-size:19px;letter-spacing:.26em;text-transform:uppercase;text-anchor:middle;font-weight:300}
  .head-n{fill:rgba(236,231,220,.6);font-size:13px;letter-spacing:.14em;text-anchor:middle}
  .divider{stroke:var(--gold);stroke-width:1;opacity:.4}
  .fadeg{opacity:0;animation:fadein 1s ease 1.4s forwards}
</style>
</head>

<script>
  const tip = document.getElementById('tip');
  const wrap = document.querySelector('.map-wrap');
  document.querySelectorAll('.zone').forEach(z=>{
    const price = z.dataset.price, region = z.dataset.region, towns = z.dataset.towns;
    if(!price) return;
    z.addEventListener('mousemove', e=>{
      const r = wrap.getBoundingClientRect();
      tip.innerHTML =
        '<div class="tp"><b>'+price+'</b><span>Genève Aéroport</span></div>'+
        '<div class="tw">'+region+'</div>'+
        '<div class="th">Communes</div>'+
        '<div class="tw" style="opacity:.8;font-size:11.5px">'+towns+'</div>';
      let x = e.clientX - r.left + 18, y = e.clientY - r.top + 18;
      if(x > r.width - 260) x = e.clientX - r.left - 260;
      tip.style.left = x+'px'; tip.style.top = y+'px';
      tip.classList.add('on');
    });
    z.addEventListener('mouseleave', ()=> tip.classList.remove('on'));
  });
</script>
